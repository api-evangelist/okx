"""
OKX Exchange GraphQL Schema
Conceptual GraphQL type system mapping OKX REST API domains:
  - Trading Account, Funding Account, Unified Account
  - Spot, Margin, Futures, Options, Perpetual trading
  - Algorithmic and copy trading orders
  - Market data, order books, candles, trades
  - Positions, margin, leverage
  - Asset management and on-chain wallet
  - API key and webhook management

Source: https://www.okx.com/docs-v5/en/
"""

# ---------------------------------------------------------------------------
# Scalars
# ---------------------------------------------------------------------------

scalar DateTime
scalar Decimal
scalar JSON

# ---------------------------------------------------------------------------
# Enums
# ---------------------------------------------------------------------------

"""Current status of a placed order."""
enum OrderStatus {
  LIVE
  PARTIALLY_FILLED
  FILLED
  CANCELED
  MMP_CANCELED
}

"""Direction of an order."""
enum OrderSide {
  BUY
  SELL
}

"""Category of order execution."""
enum OrderType {
  MARKET
  LIMIT
  POST_ONLY
  FOK
  IOC
  OPTIMAL_LIMIT_IOC
  MMP
  MMP_AND_POST_ONLY
}

"""Position side for futures/options."""
enum PosSide {
  LONG
  SHORT
  NET
}

"""Trade mode — isolated, cross, or cash."""
enum TDMode {
  ISOLATED
  CROSS
  CASH
  SPOT_ISOLATED
}

"""Instrument class."""
enum InstType {
  SPOT
  MARGIN
  FUTURES
  OPTION
  SWAP
}

"""Margin mode at the account level."""
enum MarginModeType {
  ISOLATED
  CROSS
}

"""State of a position."""
enum PositionState {
  NORMAL
  UNREALIZED_PNL_NEGATIVE
  LIQUIDATING
  PARTIALLY_LIQUIDATED
}

"""Algo order type."""
enum AlgoOrderType {
  CONDITIONAL
  OCO
  TRIGGER
  MOVE_ORDER_STOP
  TWAP
  CHASE_ORDER
  GRID
  MOON_GRID
  RECURRING_BUY
  SMART_SYNC
  COPY_TRADE
}

"""Algo order state."""
enum AlgoOrderStatus {
  LIVE
  PAUSED
  EFFECTIVE
  CANCELED
  ORDER_FAILED
}

"""Option type."""
enum OptionType {
  CALL
  PUT
}

"""Direction of a transfer."""
enum TransferType {
  TRANSFER_FROM_SUB_TO_MASTER
  TRANSFER_FROM_MASTER_TO_SUB
  INTERNAL
}

"""Webhook delivery status."""
enum WebhookStatus {
  ACTIVE
  INACTIVE
  FAILED
}

"""Event category delivered by a webhook."""
enum WebhookEventType {
  ORDER_FILLED
  ORDER_CANCELED
  POSITION_UPDATED
  DEPOSIT_CONFIRMED
  WITHDRAWAL_COMPLETED
  ALGO_ORDER_TRIGGERED
}

# ---------------------------------------------------------------------------
# Account types
# ---------------------------------------------------------------------------

"""Top-level account container for an OKX user."""
type Account {
  uid: ID!
  mainUid: ID
  label: String
  level: String
  levelTmp: String
  acctLv: String
  posMode: String
  autoLoan: Boolean
  greeksType: String
  ip: String
  perm: String
  subAcct: String
  tradingAccount: TradingAccount
  fundingAccount: FundingAccount
  unifiedAccount: UnifiedAccount
  apiKeys: [APIKey!]!
  webhooks: [Webhook!]!
}

"""Trading account — holds margin balances used for active trading."""
type TradingAccount {
  uid: ID!
  adjEq: Decimal
  borrowFroz: Decimal
  details: [CurrencyBalance!]!
  imr: Decimal
  isoEq: Decimal
  mgnRatio: Decimal
  mmr: Decimal
  notionalUsd: Decimal
  ordFroz: Decimal
  totalEq: Decimal
