# ---------------------------------------------------------------------------
# Root types
# ---------------------------------------------------------------------------

type Query {
  """Retrieve account details for the authenticated user."""
  account: Account

  """Retrieve the trading account balances."""
  tradingAccount: TradingAccount

  """Retrieve the funding account balances."""
  fundingAccount: FundingAccount

  """Retrieve the unified account (if enabled)."""
  unifiedAccount: UnifiedAccount

  """Retrieve a portfolio summary."""
  portfolio: Portfolio

  """Retrieve open positions, optionally filtered by instrument type."""
  positions(instType: InstType, instId: String, posId: ID): [Position!]!

  """Retrieve a position summary aggregated by instrument type."""
  positionSummary(instType: InstType, ccy: String): [PositionSummary!]!

  """Retrieve leverage settings for an instrument."""
  leverageInfo(instId: String!, mgnMode: TDMode!): LeverageInfo

  """Retrieve a single order by ID."""
  order(ordId: ID!, instId: String!): Order

  """Retrieve all open orders, optionally filtered."""
  openOrders(instType: InstType, instId: String, ordType: OrderType): [Order!]!

  """Retrieve order history (last 7 days by default)."""
  orderHistory(instType: InstType, instId: String, after: String, before: String, limit: Int): [Order!]!

  """Retrieve archived order history (beyond 7 days, up to 3 months)."""
  orderHistoryArchive(instType: InstType!, instId: String, after: String, before: String, limit: Int): [Order!]!

  """Retrieve algo orders."""
  algoOrders(algoOrdType: AlgoOrderType!, instType: InstType, instId: String, state: AlgoOrderStatus): [AlgoOrder!]!

  """Retrieve algo order history."""
  algoOrderHistory(algoOrdType: AlgoOrderType!, instType: InstType, after: String, before: String, limit: Int): [AlgoOrder!]!

  """Retrieve all instruments for a given type."""
  instruments(instType: InstType!, uly: String, instFamily: String): [Instrument!]!

  """Retrieve a single instrument by ID."""
  instrument(instId: String!): Instrument

  """Retrieve the option chain for an underlying and optional expiry date."""
  optionChain(underlying: String!, expDate: String): OptionChain

  """Retrieve a 24-hour ticker for an instrument."""
  ticker(instId: String!): MarketTicker

  """Retrieve all tickers for an instrument type."""
  tickers(instType: InstType!, uly: String, instFamily: String): [MarketTicker!]!

  """Retrieve the order book for an instrument."""
  orderBook(instId: String!, depth: Int): OrderBook

  """Retrieve candlestick data."""
  candles(instId: String!, bar: String, after: String, before: String, limit: Int): [Candle!]!

  """Retrieve historical candlestick data (beyond the standard window)."""
  candlesHistory(instId: String!, bar: String, after: String, before: String, limit: Int): [Candle!]!

  """Retrieve recent public trades for an instrument."""
  trades(instId: String!, limit: Int): [Trade!]!

  """Retrieve trade history."""
  tradesHistory(instId: String!, type: Int, after: String, before: String, limit: Int): [Trade!]!

  """Retrieve index price data."""
  indexTicker(instId: String!): IndexData

  """Retrieve current and next funding rate for a perpetual swap."""
  fundingRate(instId: String!): FundingRate

  """Retrieve historical funding rates."""
  fundingRateHistory(instId: String!, after: String, before: String, limit: Int): [FundingRate!]!

  """Retrieve open interest for futures or perpetuals."""
  openInterest(instType: InstType!, uly: String, instFamily: String): [OpenInterest!]!

  """Retrieve mark price."""
  markPrice(instType: InstType!, uly: String, instId: String): [Mark!]!

  """Retrieve taker volume over a period."""
  takerVolume(ccy: String!, instType: String, period: String): [TakerVolume!]!

  """Retrieve long/short account ratio."""
  longShortRatio(instId: String!, period: String): [LongShortRatio!]!

  """Retrieve recent liquidation orders."""
  liquidationOrders(instType: InstType!, uly: String, instId: String, ccy: String, before: String, after: String, limit: Int, state: String): [LiquidationOrder!]!

  """Retrieve available currencies/assets."""
  assets(ccy: String): [Asset!]!

  """Retrieve API keys for the authenticated account."""
  apiKeys: [APIKey!]!

  """Retrieve webhook registrations."""
  webhooks: [Webhook!]!

  """Retrieve webhook event delivery history."""
  webhookEvents(webhookId: ID!, limit: Int): [WebhookEvent!]!
}

type Mutation {
  """Place a new order."""
  placeOrder(input: PlaceOrderInput!): Order!

  """Cancel an existing order."""
  cancelOrder(ordId: ID!, instId: String!, clOrdId: String): Order!

  """Amend an existing live order."""
  amendOrder(input: AmendOrderInput!): Order!

  """Place an algorithmic order."""
  placeAlgoOrder(input: PlaceAlgoOrderInput!): AlgoOrder!

  """Cancel an algorithmic order."""
  cancelAlgoOrder(algoOrdId: ID!, instId: String!): AlgoOrder!

  """Amend an active algo order."""
  amendAlgoOrder(algoOrdId: ID!, instId: String!, newSz: String, newTpTriggerPx: String, newTpOrdPx: String, newSlTriggerPx: String, newSlOrdPx: String): AlgoOrder!

  """Set leverage for an instrument and margin mode."""
  setLeverage(instId: String, ccy: String, lever: String!, mgnMode: TDMode!, posSide: PosSide): LeverageInfo!

  """Set the margin mode for the account."""
  setMarginMode(acctLv: String!): Account!

  """Transfer funds between account types or sub-accounts."""
  transferFunds(input: TransferInput!): Transfer!

  """Submit a withdrawal request."""
  withdraw(input: WithdrawInput!): Withdrawal!

  """Create a new API key."""
  createAPIKey(input: APIKeyInput!): APIKey!

  """Delete an API key."""
  deleteAPIKey(apiKey: String!): Boolean!

  """Register a new webhook endpoint."""
  createWebhook(input: WebhookInput!): Webhook!

  """Update a webhook registration."""
  updateWebhook(webhookId: ID!, input: WebhookInput!): Webhook!

  """Delete a webhook registration."""
  deleteWebhook(webhookId: ID!): Boolean!
}

type Subscription {
  """Subscribe to real-time ticker updates for an instrument."""
  tickerUpdated(instId: String!): MarketTicker!

  """Subscribe to real-time order book updates."""
  orderBookUpdated(instId: String!, depth: String): OrderBook!

  """Subscribe to candlestick updates."""
  candleUpdated(instId: String!, bar: String): Candle!

  """Subscribe to real-time public trade stream."""
  tradeStream(instId: String!): Trade!

  """Subscribe to order status changes for the authenticated account."""
  orderUpdated(instId: String, instType: InstType): Order!

  """Subscribe to position updates."""
  positionUpdated(instType: InstType): Position!

  """Subscribe to account balance updates."""
  accountUpdated: TradingAccount!

  """Subscribe to funding rate updates for a perpetual swap."""
  fundingRateUpdated(instId: String!): FundingRate!

  """Subscribe to mark price updates."""
  markPriceUpdated(instType: InstType!, instId: String): Mark!

  """Subscribe to liquidation order events."""
  liquidationOrderStream(instType: InstType!): LiquidationOrder!

  """Subscribe to algo order status changes."""
  algoOrderUpdated(algoOrdType: AlgoOrderType): AlgoOrder!
}
