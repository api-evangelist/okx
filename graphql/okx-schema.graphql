}

"""Funding account — holds assets available for deposits and withdrawals."""
type FundingAccount {
  uid: ID!
  balances: [CurrencyBalance!]!
  totalUsdValue: Decimal
  updatedAt: DateTime
}

"""
Unified account combining trading and funding under a single margin pool.
Enabled for users who have switched to OKX's Unified Account mode.
"""
type UnifiedAccount {
  uid: ID!
  acctLv: String
  totalEq: Decimal
  isoEq: Decimal
  adjEq: Decimal
  ordFroz: Decimal
  imr: Decimal
  mmr: Decimal
  borrowFroz: Decimal
  mgnRatio: Decimal
  notionalUsd: Decimal
  uTime: DateTime
  details: [CurrencyBalance!]!
  riskExposure: RiskExposure
}

